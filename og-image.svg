<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0E1A"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#C9A961" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gold hairline frame -->
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#C9A961" stroke-width="1" opacity="0.4"/>

  <!-- Eyebrow -->
  <text x="600" y="200" font-family="Inter, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#C9A961" text-anchor="middle" letter-spacing="6">— INTELLIGENCE · RESILIENCE · PROTECTION</text>

  <!-- Logo mark -->
  <text x="600" y="340" font-family="Georgia, Fraunces, serif" font-size="120" font-weight="600" fill="#F4F1E8" text-anchor="middle" letter-spacing="-3">GTS Risk Advisory</text>

  <!-- Gold rule -->
  <line x1="500" y1="380" x2="700" y2="380" stroke="#C9A961" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="430" font-family="Inter, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#B8C0D4" text-anchor="middle">Intelligence-Driven Security. Operational Resilience.</text>
  <text x="600" y="464" font-family="Inter, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#B8C0D4" text-anchor="middle">Trusted Across Africa.</text>

  <!-- Coordinates -->
  <text x="600" y="540" font-family="JetBrains Mono, monospace" font-size="16" fill="#6B7593" text-anchor="middle" letter-spacing="3">-1.2921° S, 36.8219° E · NAIROBI · 2026</text>
</svg>
